<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatterly | Connect & Share</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb; /* Light gray background like X/Twitter */
            color: #111827;
        }
        /* Hide scrollbars but keep functionality for a cleaner look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>
  <div id="app">
      <div v-if="loading" class="flex items-center justify-center min-h-screen">
          <div class="animate-pulse flex flex-col items-center">
              <div class="w-12 h-12 bg-indigo-600 rounded-xl mb-4"></div>
              <p class="text-gray-400 font-medium">Connecting to Chatterly...</p>
          </div>
      </div>

      <div v-else class="min-h-screen">
        <nav class="bg-white border-b p-4 sticky top-0 z-50">
            <div class="max-w-2xl mx-auto flex justify-between items-center">
                <h1 class="font-bold text-indigo-600 text-xl tracking-tight">Chatterly</h1>
        
                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-3 border-r pr-6 border-gray-100">
                        <div class="flex flex-col items-end">
                            <span class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">Active User</span>
                            <select 
                            v-model="currentAccountId" 
                            @change="handleAccountChange"
                            class="bg-transparent text-sm font-bold text-gray-900 outline-none cursor-pointer appearance-none text-right"
                        >
                            <option v-for="acc in allAccounts" :key="acc.account_id" :value="acc.account_id">
                                @{{ acc.handle }} </option>
                            <option value="NEW_ACCOUNT" class="text-indigo-600 font-bold">+ Add New Account</option>
                        </select>
                            <div @click="openProfile(currentAccountId)" class="...">
                                {{ getActiveUsername[0]?.toUpperCase() }}
                            </div>
                        </div>
                        
                    </div>
                    
                    <button @click="showModal = true" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-bold shadow-md transition-all active:scale-95">
                        New Post
                    </button>
                </div>
            </div>
        </nav>

        <div v-if="showProfileModal" class="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-black/60 backdrop-blur-md">
            <div class="bg-white rounded-2xl w-full max-w-md p-6">
                <h2 class="text-2xl font-black text-center mb-4">@{{ profileData.username }}</h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase">Bio</label>
                        <textarea v-if="isOwnProfile" v-model="profileData.bio" class="w-full p-3 border rounded-xl h-24"></textarea>
                        <p v-else class="text-gray-700 bg-gray-50 p-3 rounded-xl italic">
                            {{ profileData.bio || 'No bio yet.' }}
                        </p>
                    </div>
        
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase">Age</label>
                        <input v-if="isOwnProfile" v-model="profileData.age" type="number" class="w-full p-3 border rounded-xl">
                        <p v-else class="text-gray-700">{{ profileData.age || 'N/A' }}</p>
                    </div>
                </div>
        
                <div class="flex gap-3 mt-8">
                    <button @click="showProfileModal = false" class="flex-1 py-3 text-gray-500 font-bold">Close</button>
                    <button v-if="isOwnProfile" @click="saveProfile" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold">
                        Save Changes
                    </button>
                </div>
            </div>
        </div>

          <main class="max-w-2xl mx-auto p-4">
            <div v-for="post in posts" :key="post.post_id" class="p-4 border-b">
              <div class="flex justify-between">
                <span 
                @click="openProfile(post.account_id)" 
                class="font-bold text-indigo-600 hover:underline cursor-pointer"
                >
                @{{ post.username }}
                </span>
                <span class="text-gray-400 text-xs">{{ formatDate(post.created_at) }}</span>
              </div>
              <p class="mt-2 text-gray-800">{{ post.content }}</p>
          </div>
          </main>
      </div>

      <div v-if="showModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
          <div class="bg-white rounded-2xl w-full max-w-lg shadow-2xl overflow-hidden">
              <div class="p-6">
                  <h3 class="text-xl font-bold mb-4 text-gray-900">Create New Post</h3>
                  <textarea v-model="newPostContent" class="w-full h-40 p-4 border rounded-xl outline-none" placeholder="What's on your mind?"></textarea>
              </div>
              <div class="flex justify-end gap-3 p-4 bg-gray-50">
                  <button @click="showModal = false" class="text-gray-600">Cancel</button>
                  <button 
                  @click="submitPost" 
                  :disabled="!newPostContent.trim() || isSubmitting"
                  class="px-6 py-2 bg-indigo-600 text-white rounded-lg font-bold disabled:opacity-50"
                >
                  {{ isSubmitting ? 'Posting...' : 'Post It' }}
                </button>
              </div>
          </div>
      </div>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="script.js"></script>
</body>
</html>

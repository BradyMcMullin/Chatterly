<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialSphere | Connect & Share</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb; /* Light gray background like X/Twitter */
            color: #111827;
        }
        /* Hide scrollbars but keep functionality for a cleaner look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>

    <div id="app">
        <div class="flex items-center justify-center min-h-screen">
            <div class="animate-pulse flex flex-col items-center">
                <div class="w-12 h-12 bg-indigo-600 rounded-xl mb-4"></div>
                <p class="text-gray-400 font-medium">Loading your feed...</p>
            </div>
        </div>
        <div v-if="showModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-lg shadow-2xl overflow-hidden">
          <div class="p-6">
            <h3 class="text-xl font-bold mb-4 text-gray-900">Create New Post</h3>
            <textarea
              v-model="newPostContent"
              placeholder="What's on your mind?"
              class="w-full h-40 p-4 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none resize-none text-lg"
            ></textarea>
          </div>

          <div class="flex items-center justify-end gap-3 p-4 bg-gray-50">
            <button @click="showModal = false" class="px-4 py-2 text-gray-600 font-medium hover:text-gray-900">
              Cancel
            </button>
            <button
              @click="submitPost"
              :disabled="!newPostContent.trim()"
              class="px-6 py-2 bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700 disabled:opacity-50 transition"
            >
              Post It
            </button>
          </div>
        </div>
      </div>`
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="script.js"></script>

</body>
</html>
